displayName: Request Dispatch
type: middleware
import: github.com/qxsugar/request-dispatch
summary: Intelligent request routing middleware for Traefik that enables gray-scale deployments and controlled feature rollouts by dispatching requests to different backend services based on request markers (headers).

testData:
  request-dispatch:
    logLevel: DEBUG
    markHeader: X-Dispatch-Mark
    markHosts:
      canary:
        - https://canary-v2.api.example.com
        - https://canary-v2-backup.api.example.com
      staging:
        - https://staging.api.example.com
      production:
        - https://prod.api.example.com
